name: laa-pipeline
# Linux x86_64 + CUDA 12.8 — standard NVIDIA desktop/server (Ampere, Ada, Hopper)
#
# Usage:
#   bash scripts/setup_env.sh          # auto-detects this config
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - nibabel>=5.2
  - SimpleITK
  - pydicom
  - numpy>=1.25
  - scipy>=1.10
  - networkx>=3.2
  - pandas
  - tqdm
  - scikit-image
  - scikit-learn
  - matplotlib
  - pyyaml
  - pip:
      - --index-url https://download.pytorch.org/whl/cu128
      - torch
      - torchvision
      - monai>=1.6.0
      - transformers>=4.40,<5
      - huggingface_hub
      - einops
      - safetensors
      - tokenizers
      - TotalSegmentator
      - CardiacCTExplorer
      - typer
      - rich
      - pydantic>=2.6
      - vtk
      - trimesh
      - rtree
      - pyradiomics
      - streamlit>=1.35
      - plotly
