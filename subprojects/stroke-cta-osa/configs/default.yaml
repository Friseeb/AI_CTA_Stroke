# stroke_cta_osa — default configuration
# RESEARCH PROTOTYPE: not for clinical use. Override fields at the command
# line with --config /path/to/yaml or programmatically via apply_overrides().

disclaimer: "RESEARCH PROTOTYPE — NOT FOR CLINICAL DIAGNOSIS"
output_dir: null   # if null the CLI requires --out

ingestion:
  input_type: auto              # dicom | nifti | auto
  orientation: RAS              # RAS | LPS | native
  resample_spacing_mm: null     # null = keep native spacing
  age_floor_years: 18           # below this the case is rejected at QC

hu:
  fat_hu_min: -190
  fat_hu_max:  -30
  air_hu_max:  -500
  bone_hu_min:  250

airway:
  use_existing_dental_airway_outputs: false
  dental_airway_mask_path: null
  dental_landmarks_path:   null
  dental_features_path:    null
  fallback_method: threshold_connected_component  # | external_mask_only | none
  external_mask_path: null
  min_component_volume_ml: 1.0
  morphology_closing_mm: 1.0
  centerline_orthogonal_csa: false   # v1 uses axial CSA
  retropalatal_window_mm: 15.0
  retroglossal_window_mm: 15.0
  retrolingual_window_mm: 10.0

fat:
  parapharyngeal_lateral_band_mm: 25.0
  parapharyngeal_axial_window_mm: 30.0
  retropharyngeal_posterior_band_mm: 15.0
  retropharyngeal_axial_window_mm: 30.0
  subcutaneous_erosion_mm: 6.0
  body_air_threshold_hu: -250.0
  exclude_bone_for_fat: true
  exclude_vessels_hu_min: 120.0
  # When TotalSegmentator/VISTA/manual masks are provided, use them as
  # conservative non-fat anatomy priors for local PP/RG/SG/RP fat ROIs.
  use_anatomy_priors: true
  anatomy_prior_dilation_mm: 1.0
  parapharyngeal_sector_min_lateral_fraction: 0.75
  # Optional TotalSegmentator/VISTA vertebra/prevertebral masks. If provided,
  # RP fat uses the anterior vertebral boundary as its posterior limit.
  prevertebral_mask_paths: []
  retropharyngeal_use_oropharyngeal_window: true
  retropharyngeal_prevertebral_margin_mm: 1.0
  retropharyngeal_lateral_margin_mm: 5.0

coverage:
  include_hard_palate: optional
  include_hyoid: optional
  include_epiglottis: optional
  include_cervical_soft_tissues: required

qc:
  min_z_extent_mm: 60.0
  max_slice_thickness_mm: 3.0
  dental_artifact_hu_threshold: 2500.0
  dental_artifact_voxel_fraction_warn: 0.001

output:
  save_masks: false
  save_qc_images: true
  save_overlays: false

radiomics:
  enabled: false
  rois: [airway, parapharyngeal_fat]
  bin_width_hu: 25.0
  label_value: 1

perivascular:
  enabled: false
  carotid_mask_path: null
  plaque_mask_path: null
  pericarotid_shell_mm: 3.0

thoracic:
  enabled: false
  epicardial_mask_path: null
  mediastinal_mask_path: null

clinical:
  clinical_csv_path: null
  patient_id_column: patient_id
  scan_id_column: scan_id

tongue:
  enabled: true
  require_mask_for_volume: true
  # Disabled by default: CTA-only posterior tongue boxes were visually unstable.
  # Provide an external mask to generate tongue features/masks.
  allow_posterior_roi_fallback: false
  low_hu_threshold: 30.0
  low_hu_threshold_mode: absolute
  record_contrast_sensitivity: true
  external_mask_path: null

mandible:
  enabled: true
  # Disabled by default: high-HU connected components can select non-mandible bone.
  # Provide an external/manual mask for mandible features.
  allow_bone_threshold_fallback: false
  bone_hu_min: 250.0
  require_mask_for_volume: true
  bone_min_volume_ml: 5.0
  external_mask_path: null
  # Real dental-pipeline mandible/jawbone mask, e.g. lower_jawbone.nii.gz.
  # This is preferred over any CTA-only fallback when provided.
  dental_mandible_mask_path: null

# ---------------------------------------------------------------------------
# Evidence-aware feature selection
# ---------------------------------------------------------------------------
# The pipeline ALWAYS computes every implemented feature. These blocks only
# govern which tiered subset CSVs are written and which set is the default
# modelling target recorded per run. See docs/stroke_cta_osa/FEATURE_SETS.md.
feature_selection:
  output_all_features: true
  output_feature_sets: true
  default_modeling_feature_set: core_osa_backed
  allowed_feature_sets:
    - core_osa_backed                 # Tier 1 only — primary phenotype
    - core_plus_anatomic_extensions   # Tier 1 + Tier 2
    - core_plus_cardiometabolic_ct    # Tier 1 + Tier 3
    - all_features_exploratory        # Tier 1-4 + radiomics + composites

evidence_tiers:
  include_tier_1_core_osa_backed: true
  include_tier_2_osa_plausible_ct_anatomic: true
  include_tier_3_ct_cardiometabolic_or_vascular: true
  include_tier_4_stroke_cta_novel_exploratory: true
