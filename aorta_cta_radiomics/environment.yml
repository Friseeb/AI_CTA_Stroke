name: aorta-cta-radiomics
channels:
  - conda-forge
dependencies:
  - python=3.11
  - numpy
  - scipy
  - pandas
  - scikit-image
  - scikit-learn
  - simpleitk
  - nibabel
  - pyyaml
  - typer
  - tqdm
  - matplotlib
  - pytest
  - pip
  - pip:
      - --no-build-isolation
      - pyradiomics==3.0.1
      - -e .

# Optional, install only when needed:
#   conda install -c conda-forge pyvista trimesh
#   pip install monai torch
#   pip install -e ".[encoders]"
#   pip install -e ".[ct-fm]"
#   pip install -e ".[all-encoders]"
# On macOS, if torch reports duplicate OpenMP runtimes:
#   export KMP_DUPLICATE_LIB_OK=TRUE
